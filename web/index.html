  <style>
    body {
      background-color: #F3F4F6; /* Màu nền xám nhạt */
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .loader-container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .spinner {
      border: 4px solid rgba(103, 80, 164, 0.2);
      border-top: 4px solid #6750A4; /* Màu tím Primary */
      border-radius: 50%;
      width: 48px;
      height: 48px;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }
    .loading-text {
      color: #6750A4;
      font-weight: 600;
      letter-spacing: 1px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div id="loading_indicator" class="loader-container">
    <div class="spinner"></div>
    <div class="loading-text">ĐANG TẢI...</div>
  </div>

  <script>
    // Xóa cái cục Loading Spinner ngay khi Flutter engine đã sẵn sàng render
    window.addEventListener('load', function() {
      var loadingIndicator = document.getElementById('loading_indicator');

        loadingIndicator.remove();
